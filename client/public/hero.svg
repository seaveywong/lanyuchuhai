<!-- Kyro · Pay & Deliver Illustration -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" fill="none">
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Ambient circles -->
  <circle cx="380" cy="60" r="120" fill="rgba(99,102,241,0.05)"/>
  <circle cx="90" cy="230" r="90" fill="rgba(6,182,212,0.04)"/>

  <!-- Payment wallet card -->
  <g transform="translate(50,85)" filter="url(#sh)">
    <rect width="150" height="95" rx="12" fill="#1E293B"/>
    <rect x="14" y="16" width="72" height="7" rx="3.5" fill="#334155"/>
    <rect x="14" y="30" width="44" height="7" rx="3.5" fill="#334155"/>
    <!-- USDT bar -->
    <rect x="14" y="52" width="122" height="24" rx="6" fill="url(#c)" opacity="0.85"/>
    <text x="34" y="68" fill="#fff" font-size="11" font-family="monospace" font-weight="600">USDT TRC20</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(225,130)">
    <path d="M0 5 L55 5" stroke="#CBD5E1" stroke-width="2.5" stroke-dasharray="6 4"/>
    <polygon points="55,0 68,5 55,10" fill="#6366F1"/>
  </g>

  <!-- Delivery key box -->
  <g transform="translate(305,75)" filter="url(#sh)">
    <rect width="130" height="115" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <!-- Key icon inside -->
    <g transform="translate(42,28)">
      <circle cx="23" cy="12" r="16" stroke="url(#p)" stroke-width="2.5" fill="none"/>
      <line x1="23" y1="28" x2="23" y2="54" stroke="url(#p)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="23" y1="40" x2="40" y2="40" stroke="url(#p)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="23" y1="48" x2="36" y2="48" stroke="url(#p)" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Bottom feature dots -->
  <g transform="translate(70,240)">
    <circle cx="0" cy="0" r="3.5" fill="#6366F1"/>
    <text x="10" y="4" font-size="10" fill="#64748B" font-family="sans-serif">On-Chain Payment</text>
    <circle cx="180" cy="0" r="3.5" fill="#10B981"/>
    <text x="190" y="4" font-size="10" fill="#64748B" font-family="sans-serif">Instant Confirm</text>
    <circle cx="330" cy="0" r="3.5" fill="#F59E0B"/>
    <text x="340" y="4" font-size="10" fill="#64748B" font-family="sans-serif">Auto Delivery</text>
  </g>
</svg>

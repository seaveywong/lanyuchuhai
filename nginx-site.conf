# 蓝域出海 BlueReach — Nginx 配置（前后端同机部署）
# 放 VPS 上: /etc/nginx/sites-available/bluereach

server {
    listen 80;
    server_name lanyu888888.com;

    # 前端静态文件
    root /var/www/lanyuchuhai/client;
    index index.html;

    # 前端 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # 限流
        limit_req zone=api burst=10 nodelay;

        # Admin 登录额外限制
        location /api/admin/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # 安全：禁止访问敏感文件
    location ~ /\. { deny all; }
    location ~ \.env$ { deny all; }
    location ~ /prisma/ { deny all; }
    location ~ /node_modules/ { deny all; }
    location ~ /package\.json$ { deny all; }
}

# 限流区域定义（放在 http 块里，如果 Nginx 报错就放到 nginx.conf 的 http {} 中）
# limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;
# limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
